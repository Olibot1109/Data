<!DOCTYPE html>
<html>
<body>

<script>
const params = new URLSearchParams(location.search);

const action = params.get("action");
const key = params.get("key");
const value = params.get("value");
const back = params.get("return");

let data = {};

try {
    data = JSON.parse(localStorage.getItem("dataserver") || "{}");
} catch (e) {
    data = {};
}

let result = {
    success: false,
    action: action || null,
    key: key || null,
    value: null,
    data: null
};

if (action === "write") {

    data[key] = value;

    localStorage.setItem(
        "dataserver",
        JSON.stringify(data)
    );

    result = {
        success: true,
        action: "write",
        key,
        value,
        data
    };
}

else if (action === "read") {

    result = {
        success: true,
        action: "read",
        key,
        value: data[key] ?? null,
        data
    };
}

else if (action === "list") {

    result = {
        success: true,
        action: "list",
        data
    };
}

// delay redirect so storage + UI is stable
if (back) {

    setTimeout(() => {

        location.href =
            back +
            (back.includes("?") ? "&" : "?") +
            "data=" +
            encodeURIComponent(JSON.stringify(result));

    }, 1000);
}

</script>

<h3>Processing request...</h3>

</body>
</html>
