<!DOCTYPE html>
<html>
<head>
    <title>DataAPI Debug Panel</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        pre {
            padding: 10px;
            overflow: auto;
        }

        .box {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<h2>DataAPI Debug Panel</h2>

<div class="box">
    <h3>Request</h3>
    <pre id="req"></pre>
</div>

<div class="box">
    <h3>Database</h3>
    <pre id="db"></pre>
</div>

<div class="box">
    <h3>Response</h3>
    <pre id="res"></pre>
</div>

<script>
const params = new URLSearchParams(location.search);

const action = params.get("action");
const key = params.get("key");
let value = params.get("value");
const back = params.get("return");

// try parse JSON values safely
try {
    value = JSON.parse(value);
} catch (e) {
    // keep as string if not JSON
}

// load DB safely
let data = {};
try {
    data = JSON.parse(localStorage.getItem("dataserver") || "{}");
} catch (e) {
    data = {};
}

// REQUEST VIEW
const request = {
    action,
    key,
    value,
    return: back
};

document.getElementById("req").textContent =
    JSON.stringify(request, null, 2);

// RESPONSE
let result = {
    success: false,
    action: action || null
};

if (action === "write") {

    data[key] = value;

    localStorage.setItem(
        "dataserver",
        JSON.stringify(data)
    );

    result = {
        success: true,
        action: "write",
        key,
        value,
        data
    };
}

else if (action === "read") {

    result = {
        success: true,
        action: "read",
        key,
        value: data[key] ?? null,
        data
    };
}

else if (action === "list") {

    result = {
        success: true,
        action: "list",
        data
    };
}

// DB VIEW
document.getElementById("db").textContent =
    JSON.stringify(data, null, 2);

// RESPONSE VIEW
document.getElementById("res").textContent =
    JSON.stringify(result, null, 2);

// CLEAN REDIRECT (FIXED)
if (back) {

    const url = new URL(back);

    url.searchParams.set(
        "data",
        JSON.stringify(result)
    );

    setTimeout(() => {
        location.href = url.toString();
    }, 1000);
}
</script>

</body>
</html>
